<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>
        Gestión de Conductores
    </title>

    <link
        rel="stylesheet"
        href="../css/style.css"
    >
</head>

<body>

    <h1>
        Gestión de Conductores
    </h1>

    <a href="../index.html">
        Volver al menú
    </a>

    <hr>

    <h2>
        Registrar conductor
    </h2>

    <form id="formConductor">

        <input
            type="text"
            id="nombres"
            placeholder="Nombres"
            required
        >

        <input
            type="text"
            id="apellidos"
            placeholder="Apellidos"
            required
        >

        <input
            type="text"
            id="documento"
            placeholder="Documento"
            required
        >

        <input
            type="text"
            id="telefono"
            placeholder="Teléfono"
            required
        >

        <input
            type="email"
            id="correo"
            placeholder="Correo"
            required
        >

        <input
            type="text"
            id="numero_licencia"
            placeholder="Número licencia"
            required
        >

        <input
            type="text"
            id="categoria_licencia"
            placeholder="Categoría licencia"
            required
        >

        <label>
            Fecha vencimiento licencia
        </label>

        <input
            type="date"
            id="fecha_vencimiento_licencia"
            required
        >

        <br><br>

        <button type="submit">
            Guardar conductor
        </button>

    </form>

    <hr>

    <h2>
        Lista de conductores
    </h2>

    <table border="1">

        <thead>

            <tr>
                <th>ID</th>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>Documento</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Licencia</th>
                <th>Categoría</th>
                <th>Vencimiento</th>
                <th>Estado</th>
            </tr>

        </thead>

        <tbody id="tablaConductores">

        </tbody>

    </table>

    <script src="../js/conductores.js"></script>

</body>

</html>
