<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conductores - LogiTrans</title>
    <link rel="stylesheet" href="../css/modulos.css">
</head>
<body style="display:flex;margin:0;font-family:Arial,sans-serif">

    <aside class="sidebar">
        <h2>LogiTrans</h2>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="conductores.html" class="activo">Conductores</a>
            <a href="vehiculos.html">Vehículos</a>
            <a href="rutas.html">Rutas</a>
            <a href="programaciones.html">Programaciones</a>
            <a href="seguimientos.html">Seguimientos</a>
        </nav>
        <button id="btnLogout">Cerrar sesión</button>
    </aside>

    <main class="contenido">
        <h1>Gestión de Conductores</h1>

        <div class="card-form">
            <h2 id="tituloForm">Registrar Conductor</h2>
            <div id="msg"></div>
            <input type="hidden" id="conductorId">
            <div class="form-grid">
                <div class="form-group"><label>Nombres</label><input type="text" id="nombres" required></div>
                <div class="form-group"><label>Apellidos</label><input type="text" id="apellidos" required></div>
                <div class="form-group"><label>Documento</label><input type="text" id="documento" required></div>
                <div class="form-group"><label>Teléfono</label><input type="text" id="telefono" required></div>
                <div class="form-group"><label>Correo</label><input type="email" id="correo" required></div>
                <div class="form-group"><label>Número de licencia</label><input type="text" id="numero_licencia" required></div>
                <div class="form-group"><label>Categoría de licencia</label><input type="text" id="categoria_licencia" placeholder="C2, C3..." required></div>
                <div class="form-group"><label>Vencimiento licencia</label><input type="date" id="fecha_vencimiento_licencia" required></div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" id="btnGuardar" onclick="guardarConductor()">Registrar</button>
                <button class="btn btn-secondary" id="btnCancelar" onclick="cancelarEdicion()" style="display:none">Cancelar</button>
            </div>
        </div>

        <div class="tabla-wrap">
            <h2 style="padding:16px 20px 12px">Lista de Conductores</h2>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>ID</th><th>Nombres</th><th>Apellidos</th><th>Documento</th>
                        <th>Teléfono</th><th>Licencia</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaConductores"></tbody>
            </table>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/conductores.js"></script>

</body>
</html>
