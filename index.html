<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrans - Login</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="login-container">

        <h1>LogiTrans</h1>

        <form id="loginForm">

            <input
                type="text"
                id="usuario"
                placeholder="Usuario o correo"
                required
            >

            <input
                type="password"
                id="contrasena"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

        <p id="mensaje"></p>

    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
